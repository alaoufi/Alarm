name: Build APK

# يبني ملف APK للتطبيق تلقائياً ويرفعه كـ Release برابط تنزيل مباشر.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Prepare APKs
        run: |
          cd build/app/outputs/flutter-apk
          # نسخة arm64 هي الأساسية (تعمل على ~99% من الهواتف الحديثة)،
          # ونحافظ على اسم ثابت app-release.apk حتى لا يتغيّر رابط التنزيل.
          cp app-arm64-v8a-release.apk app-release.apk
          ls -lh app-*.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: أحدث نسخة APK
          body: |
            ملف APK لأحدث نسخة من تطبيق "Alerts".

            • app-release.apk  → الأنسب لمعظم الهواتف (arm64-v8a) — حمّل هذا.
            • app-armeabi-v7a-release.apk → لهواتف أندرويد القديمة جداً (32-bit).

            ثبّته على هاتف أندرويد 8.0+. بُني من الـ commit ${{ github.sha }}.
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
