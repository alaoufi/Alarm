name: Build APK

# يبني ملف APK للتطبيق تلقائياً ويرفعه كـ Release برابط تنزيل مباشر.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      # رقم نسخة متصاعد لكل بناء (1.0.<رقم التشغيل>) كي يكتشف التحديث الداخليّ
      # توفّر نسخة أحدث ويقارن بالاسم بشكل صحيح.
      - name: Build release APKs (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=1.0.${{ github.run_number }} \
            --build-number=${{ github.run_number }}

      - name: Prepare APKs and version manifest
        run: |
          cd build/app/outputs/flutter-apk
          # اسم ملفّ واضح للتطبيق: Alerts.apk (نسخة arm64 لمعظم الهواتف الحديثة)،
          # وملفّ منفصل للهواتف القديمة 32-بت.
          cp app-arm64-v8a-release.apk Alerts.apk
          cp app-armeabi-v7a-release.apk Alerts-arm32.apk
          ls -lh Alerts*.apk
          # بيان النسخة للتحديث الداخليّ.
          cat > version.json <<EOF
          {
            "version": "1.0.${{ github.run_number }}",
            "build": ${{ github.run_number }},
            "url": "https://github.com/alaoufi/Alarm/releases/download/latest/Alerts.apk"
          }
          EOF
          cat version.json

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Alerts-apks
          path: build/app/outputs/flutter-apk/Alerts*.apk
          if-no-files-found: error

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: أحدث نسخة APK
          body: |
            ملف APK لأحدث نسخة من تطبيق "Alerts" (1.0.${{ github.run_number }}).

            • Alerts.apk  → الأنسب لمعظم الهواتف (arm64-v8a) — حمّل هذا.
            • Alerts-arm32.apk → لهواتف أندرويد القديمة جداً (32-bit).

            ثبّته على هاتف أندرويد 8.0+. بُني من الـ commit ${{ github.sha }}.
          files: |
            build/app/outputs/flutter-apk/Alerts.apk
            build/app/outputs/flutter-apk/Alerts-arm32.apk
            build/app/outputs/flutter-apk/version.json
