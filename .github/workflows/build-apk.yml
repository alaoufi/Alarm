name: Build APK

# يبني ملف APK للتطبيق تلقائياً ويرفعه كـ Release برابط تنزيل مباشر.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: أحدث نسخة APK
          body: |
            ملف APK لأحدث نسخة من تطبيق "تنبيهات".
            نزّله من قسم Assets بالأسفل وثبّته على هاتف أندرويد (8.0+).
            بُني من الـ commit ${{ github.sha }}.
          files: build/app/outputs/flutter-apk/app-release.apk
